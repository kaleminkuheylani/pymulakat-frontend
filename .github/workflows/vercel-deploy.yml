name: Vercel Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [vercel-deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "Vercel deploy hook tetiklendi"
          else
            echo "VERCEL_DEPLOY_HOOK secret tanimli degil, fallback: direct vercel CLI"
            npm install -g vercel
            vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
          fi
