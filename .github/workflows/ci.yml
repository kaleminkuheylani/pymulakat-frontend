name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx eslint . --ext .ts,.tsx || echo "ESLint warnings (non-blocking)"
      - run: npx tsc --noEmit || echo "TypeScript warnings (non-blocking)"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Prebuild
        run: node scripts/fetch-questions.mjs
        env:
          NEXT_PUBLIC_API_URL: https://pymulakat-backend-production.up.railway.app
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: https://pymulakat-backend-production.up.railway.app
